name: Deploy marici LP to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'marici_nakanishi_lp_premium/**'
      - '.github/workflows/deploy-marici-lp.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: marici_nakanishi_lp_premium

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
